<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biel Store 💎 | Recargas Oficiais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: #fff; }
        .product-card { background: #16161a; border: 1px solid #27272a; transition: all 0.3s; }
        .product-card:hover { border-color: #db2777; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-zinc-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-pink-600">BIEL STORE 💎</h1>
            <div class="flex gap-4 text-sm font-bold text-zinc-400">
                <a href="https://instagram.com/bielcalvokkj" class="hover:text-white">@bielcalvokkj</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black mb-2">RECARGA DIAMANTES</h2>
            <p class="text-zinc-500">Selecione a quantidade desejada para sua conta.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
            <!-- Pacote 1 -->
            <div class="product-card p-6 rounded-2xl text-center">
                <img src="https://imagensemoldes.com.br/wp-content/uploads/2020/05/Free-Fire-Diamante-PNG.png" class="w-16 mx-auto mb-4" alt="Diamantes">
                <h3 class="text-2xl font-black">110 Dimas</h3>
                <p class="text-zinc-500 mb-4">+ Bônus incluso</p>
                <div class="text-3xl font-black text-green-500 mb-6">R$ 4,50</div>
                <button onclick="comprar(110, 4.50)" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold transition">SELECIONAR</button>
            </div>

            <!-- Pacote 2 -->
            <div class="product-card p-6 rounded-2xl text-center border-pink-600/50 relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-pink-600 text-[10px] font-black px-3 py-1 rounded-bl-lg">MAIS VENDIDO</div>
                <img src="https://imagensemoldes.com.br/wp-content/uploads/2020/05/Free-Fire-Diamante-PNG.png" class="w-16 mx-auto mb-4" alt="Diamantes">
                <h3 class="text-2xl font-black">341 Dimas</h3>
                <p class="text-zinc-500 mb-4">+ Bônus incluso</p>
                <div class="text-3xl font-black text-green-500 mb-6">R$ 14,00</div>
                <button onclick="comprar(341, 14.00)" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold transition">SELECIONAR</button>
            </div>

            <!-- Pacote 3 -->
            <div class="product-card p-6 rounded-2xl text-center">
                <img src="https://imagensemoldes.com.br/wp-content/uploads/2020/05/Free-Fire-Diamante-PNG.png" class="w-16 mx-auto mb-4" alt="Diamantes">
                <h3 class="text-2xl font-black">572 Dimas</h3>
                <p class="text-zinc-500 mb-4">+ Bônus incluso</p>
                <div class="text-3xl font-black text-green-500 mb-6">R$ 21,00</div>
                <button onclick="comprar(572, 21.00)" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold transition">SELECIONAR</button>
            </div>

            <!-- Pacote 4 -->
            <div class="product-card p-6 rounded-2xl text-center">
                <img src="https://imagensemoldes.com.br/wp-content/uploads/2020/05/Free-Fire-Diamante-PNG.png" class="w-20 mx-auto mb-4" alt="Diamantes">
                <h3 class="text-2xl font-black">1.166 Dimas</h3>
                <div class="text-3xl font-black text-green-500 mb-6">R$ 45,00</div>
                <button onclick="comprar(1166, 45.00)" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold transition">SELECIONAR</button>
            </div>

            <!-- Pacote 5 -->
            <div class="product-card p-6 rounded-2xl text-center">
                <img src="https://imagensemoldes.com.br/wp-content/uploads/2020/05/Free-Fire-Diamante-PNG.png" class="w-20 mx-auto mb-4" alt="Diamantes">
                <h3 class="text-2xl font-black">2.398 Dimas</h3>
                <div class="text-3xl font-black text-green-500 mb-6">R$ 88,00</div>
                <button onclick="comprar(2398, 88.00)" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold transition">SELECIONAR</button>
            </div>
        </div>
    </main>

    <script>
        function comprar(qtd, preco) {
            localStorage.setItem('compra_qtd', qtd);
            localStorage.setItem('compra_preco', preco.toFixed(2));
            window.location.href = 'checkout.html';
        }
    </script>
</body>
                    </html>
