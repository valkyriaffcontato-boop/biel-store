<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biel Store | Centro de Recargas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f1115; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .game-card:hover { border-color: #ff0055; transform: scale(1.02); }
    </style>
</head>
<body class="text-white">

    <nav class="bg-[#1a1d23] p-4 border-b border-zinc-800 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white tracking-tighter">BIEL <span class="text-pink-600">STORE</span></h1>
            <a href="https://instagram.com/bielcalvokkj" class="text-sm text-zinc-400">@bielcalvokkj</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12">
        <h2 class="text-center text-2xl font-bold mb-8">Selecione o jogo para recarregar</h2>
        
        <div class="max-w-xs mx-auto">
            <a href="login.html" class="game-card bg-[#1a1d23] block rounded-xl overflow-hidden border-2 border-transparent transition-all shadow-2xl">
                <div class="relative h-64">
                    <img src="https://ff.garena.com/static/hero-banner.88600171.jpg" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                    <div class="absolute bottom-4 left-4">
                        <p class="font-black text-xl italic uppercase">Free Fire</p>
                        <p class="text-xs text-zinc-400">Garena Online</p>
                    </div>
                </div>
                <div class="p-4 text-center text-pink-500 font-bold uppercase tracking-widest text-sm">
                    Recarregar Agora
                </div>
            </a>
        </div>
    </div>
</body>
</html>
