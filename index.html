<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biel Store 💎 | Diamantes Free Fire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: white; }
        .neon-border { border: 1px solid #db2777; box-shadow: 0 0 10px #db2777; }
        .btn-pay { background: linear-gradient(90deg, #6b21a8, #db2777); transition: 0.3s; }
        .btn-pay:hover { transform: scale(1.05); box-shadow: 0 0 20px #db2777; }
    </style>
</head>
<body>

    <header class="p-4 border-b border-zinc-800 bg-black/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-tighter italic text-pink-500">BIEL STORE 💎</h1>
            <a href="https://www.instagram.com/bielcalvokkj" target="_blank" class="text-zinc-400 hover:text-pink-500 transition">@bielcalvokkj</a>
        </div>
    </header>

    <section class="py-12 px-4">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl font-bold mb-8 italic uppercase text-center text-white">Selecione os Diamantes 🔥</h2>
            
            <div class="grid grid-cols-1 gap-4">
                <!-- Tabela Simplificada -->
                <div class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800">
                    <div class="grid grid-cols-3 bg-zinc-800 p-4 font-bold text-pink-500 uppercase text-sm">
                        <div>Quantidade</div>
                        <div>Preço</div>
                        <div class="text-right">Ação</div>
                    </div>
                    
                    <!-- Item 110 -->
                    <div class="grid grid-cols-3 p-4 border-b border-zinc-800 items-center font-bold text-xl">
                        <div>110 <i class="fas fa-gem text-blue-400 text-sm"></i></div>
                        <div class="text-green-400 font-bold">R$ 4,50</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('110 Diamantes', '4.50')" class="btn-pay px-4 py-2 rounded-lg text-sm">COMPRAR</button>
                        </div>
                    </div>

                    <!-- Item 341 -->
                    <div class="grid grid-cols-3 p-4 border-b border-zinc-800 items-center font-bold text-xl">
                        <div>341 <i class="fas fa-gem text-blue-400 text-sm"></i></div>
                        <div class="text-green-400">R$ 14,00</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('341 Diamantes', '14.00')" class="btn-pay px-4 py-2 rounded-lg text-sm">COMPRAR</button>
                        </div>
                    </div>

                    <!-- Item 572 -->
                    <div class="grid grid-cols-3 p-4 border-b border-zinc-800 items-center font-bold text-xl bg-pink-600/5">
                        <div>572 <i class="fas fa-gem text-blue-400 text-sm"></i></div>
                        <div class="text-green-400">R$ 21,00</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('572 Diamantes', '21.00')" class="btn-pay px-4 py-2 rounded-lg text-sm">COMPRAR</button>
                        </div>
                    </div>

                    <!-- Item 1166 -->
                    <div class="grid grid-cols-3 p-4 border-b border-zinc-800 items-center font-bold text-xl">
                        <div>1.166 <i class="fas fa-gem text-blue-400 text-sm"></i></div>
                        <div class="text-green-400">R$ 45,00</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('1.166 Diamantes', '45.00')" class="btn-pay px-4 py-2 rounded-lg text-sm">COMPRAR</button>
                        </div>
                    </div>

                    <!-- Item 2398 -->
                    <div class="grid grid-cols-3 p-4 border-b border-zinc-800 items-center font-bold text-xl text-yellow-500">
                        <div>2.398 <i class="fas fa-gem text-sm"></i></div>
                        <div class="text-green-400 font-bold">R$ 88,00</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('2.398 Diamantes', '88.00')" class="btn-pay px-4 py-2 rounded-lg text-sm text-white">COMPRAR</button>
                        </div>
                    </div>

                    <!-- Item VIP -->
                    <div class="grid grid-cols-3 p-4 items-center font-bold text-xl text-yellow-500 bg-yellow-500/5">
                        <div>24.640 👑</div>
                        <div class="text-yellow-500">R$ 840,00</div>
                        <div class="text-right">
                            <button onclick="irParaPagamento('24.640 Diamantes VIP', '840.00')" class="bg-yellow-600 px-4 py-2 rounded-lg text-sm text-black">COMPRAR</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-zinc-600 text-sm border-t border-zinc-900">
        <p>Biel Store - @bielcalvokkj</p>
        <div class="flex justify-center gap-4 mt-2">
            <a href="termos.html" class="underline">Termos</a>
            <a href="como-comprar.html" class="underline">Ajuda</a>
        </div>
    </footer>

    <script>
        function irParaPagamento(item, valor) {
            // Salva no navegador o que o cara escolheu e vai pra tela de pagamento
            localStorage.setItem('itemNome', item);
            localStorage.setItem('itemValor', valor);
            window.location.href = 'pagamento.html';
        }
    </script>
</body>
    </html>
