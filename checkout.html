<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checkout Final | Biel Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f1115] text-white py-12 px-4">
    <div class="max-w-2xl mx-auto bg-[#1a1d23] p-8 rounded-2xl shadow-2xl border border-zinc-800">
        <h2 class="text-2xl font-black mb-8 border-b border-zinc-800 pb-4 italic">CONCLUIR RECARGA</h2>
        
        <form id="checkout-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase">Nome Completo</label>
                    <input type="text" id="nome" class="w-full bg-[#0f1115] p-4 rounded border border-zinc-700 outline-none" placeholder="Digite seu nome" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase">CPF</label>
                    <input type="text" id="cpf" class="w-full bg-[#0f1115] p-4 rounded border border-zinc-700 outline-none" placeholder="000.000.000-00" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase">Data de Nascimento</label>
                    <input type="date" id="data_nasc" class="w-full bg-[#0f1115] p-4 rounded border border-zinc-700 outline-none" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase">E-mail para Recibo</label>
                    <input type="email" id="email" class="w-full bg-[#0f1115] p-4 rounded border border-zinc-700 outline-none" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="bg-black/50 p-6 rounded-xl space-y-2 mt-8">
                <div class="flex justify-between"><span>Produto:</span> <span id="out-pack" class="font-bold"></span></div>
                <div class="flex justify-between"><span>ID Jogador:</span> <span id="out-id" class="font-bold"></span></div>
                <div class="flex justify-between text-green-500 font-black text-xl border-t border-zinc-800 pt-2 mt-2">
                    <span>TOTAL:</span> <span id="out-price"></span>
                </div>
            </div>

            <button type="submit" class="w-full bg-pink-600 py-5 rounded-lg font-black text-xl hover:bg-pink-700 transition">FINALIZAR E PAGAR</button>
        </form>
    </div>

    <script>
        document.getElementById('out-pack').innerText = localStorage.getItem('final_pack');
        document.getElementById('out-id').innerText = localStorage.getItem('user_id');
        document.getElementById('out-price').innerText = "R$ " + localStorage.getItem('final_price');

        document.getElementById('checkout-form').addEventListener('submit', function(e){
            e.preventDefault();
            const pack = localStorage.getItem('final_pack');
            const price = localStorage.getItem('final_price');
            const id = localStorage.getItem('user_id');
            const nome = document.getElementById('nome').value;
            const pay = localStorage.getItem('final_pay');

            const msg = `💎 NOVO PEDIDO BIEL STORE%0A---%0A👤 Nome: ${nome}%0A🆔 ID FF: ${id}%0A📦 Produto: ${pack}%0A💰 Valor: R$ ${price}%0A💳 Método: ${pay}%0A---%0AAguardando link de pagamento!`;
            window.location.href = `https://wa.me/5533991160044?text=${msg}`;
        });
    </script>
</body>
</html>
