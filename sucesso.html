<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0c] text-white flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        
        <h1 class="text-3xl font-black mb-2">PEDIDO GERADO!</h1>
        <p class="text-zinc-400 mb-8">Aguardando confirmação do pagamento para liberar seus diamantes.</p>
        
        <div class="bg-zinc-900 rounded-2xl p-6 text-left mb-8 border border-zinc-800 font-mono text-sm">
            <p class="text-pink-500 mb-2 font-bold">DETALHES DO TICKET:</p>
            <div id="detalhes" class="space-y-1"></div>
        </div>

        <button onclick="finalizarNoZap()" class="w-full bg-green-600 py-4 rounded-xl font-black text-lg flex items-center justify-center gap-3">
            PAGAR AGORA NO WHATSAPP
        </button>
    </div>

    <script>
        const pedido = JSON.parse(localStorage.getItem('ultimo_pedido'));
        const div = document.getElementById('detalhes');
        
        div.innerHTML = `
            <p>CLIENTE: ${pedido.nome}</p>
            <p>CPF: ${pedido.cpf}</p>
            <p>ID FF: ${pedido.id}</p>
            <p>PRODUTO: ${pedido.qtd} DIAMANTES</p>
            <p>PAGAMENTO: ${pedido.metodo}</p>
            <p class="text-green-500 font-bold mt-2 text-lg">VALOR: R$ ${pedido.total}</p>
        `;

        function finalizarNoZap() {
            const msg = `🚀 NOVO PEDIDO - BIEL STORE%0A%0A👤 Nome: ${pedido.nome}%0A🆔 ID FF: ${pedido.id}%0A💎 Qtd: ${pedido.qtd} Dimas%0A💳 Pagamento: ${pedido.metodo}%0A💰 Total: R$ ${pedido.total}%0A%0AAguardando link/chave para pagamento!`;
            window.open(`https://wa.me/5533991160044?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
