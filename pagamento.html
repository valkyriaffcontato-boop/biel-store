<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | Biel Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .pix-box { border: 2px dashed #db2777; background: #111; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-3xl p-8 border border-zinc-800 shadow-2xl">
        <a href="index.html" class="text-zinc-500 mb-6 inline-block hover:text-white transition"><i class="fas fa-arrow-left"></i> Voltar</a>
        
        <h2 class="text-2xl font-bold mb-2">Finalizar Recarga 💎</h2>
        <div id="resumo" class="bg-black/40 p-4 rounded-xl mb-6 border-l-4 border-pink-600">
            <p class="text-zinc-400 text-sm uppercase font-bold">Produto selecionado:</p>
            <p id="nome-item" class="text-xl font-black">---</p>
            <p class="text-zinc-400 text-sm uppercase font-bold mt-2">Valor a pagar:</p>
            <p id="valor-item" class="text-3xl font-black text-green-400">R$ 0,00</p>
        </div>

        <div class="pix-box p-6 rounded-2xl text-center mb-6">
            <p class="text-pink-500 font-bold mb-4 uppercase text-sm">Pague via PIX</p>
            <!-- QR CODE FAKE - Você pode colocar o seu real aqui -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CHAVE-PIX-AQUI" alt="QR Code PIX" class="mx-auto mb-4 bg-white p-2 rounded">
            
            <p class="text-xs text-zinc-500 mb-2">Chave PIX (E-mail/Celular):</p>
            <div class="flex gap-2">
                <input type="text" id="pix-chave" value="33991160044" class="w-full bg-black border border-zinc-700 p-2 rounded text-sm text-center font-mono" readonly>
                <button onclick="copiarPix()" class="bg-zinc-800 px-3 rounded hover:bg-pink-600 transition"><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="space-y-4">
            <input type="number" id="ff-id" placeholder="Digite seu ID do Free Fire" class="w-full bg-black border border-zinc-700 p-4 rounded-xl outline-none focus:border-pink-600 font-bold text-center">
            
            <button onclick="confirmarPedido()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl text-lg transition flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> JÁ PAGUEI, ENVIAR COMPROVANTE
            </button>
        </div>
        
        <p class="text-center text-[10px] text-zinc-600 mt-6 uppercase">Após o envio do comprovante no WhatsApp, seus diamantes caem em minutos.</p>
    </div>

    <script>
        // Pega os dados que foram salvos na index
        const nome = localStorage.getItem('itemNome');
        const valor = localStorage.getItem('itemValor');

        if(nome && valor) {
            document.getElementById('nome-item').innerText = nome;
            document.getElementById('valor-item').innerText = 'R$ ' + valor;
        }

        function copiarPix() {
            const input = document.getElementById('pix-chave');
            input.select();
            document.execCommand('copy');
            alert('Chave PIX copiada!');
        }

        function confirmarPedido() {
            const id = document.getElementById('ff-id').value;
            if(!id) {
                alert('Mano, coloca o ID do FF aí!');
                return;
            }
            const msg = `Salve Biel! %0AFiz o pagamento de R$ ${valor} para ${nome}.%0A%0AMeu ID: ${id}%0A%0AEstou enviando o comprovante abaixo! 👇`;
            window.open(`https://wa.me/5533991160044?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
